<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d12">
<title>Aertherion · Projects</title>
<style>
:root {
  --ink: #f0ece4;
  --ink-dim: #8b887e;
  --paper: #0d0d12;
  --paper-lift: #15151d;
  --gold: #c9a96e;
  --gold-burn: #e8c97a;
  --line: rgba(240,236,228,0.08);
  --radius: 14px;
  --font: 'Georgia', 'Times New Roman', 'PingFang SC', 'Microsoft YaHei', 'Noto Serif SC', serif;
  --mono: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(201,169,110,0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(177,85,51,0.03) 0%, transparent 50%);
  -webkit-tap-highlight-color: transparent;
}

.header {
  text-align: center;
  margin-bottom: 60px;
}
.header h1 {
  font-size: clamp(1.6rem, 5vw, 2.6rem);
  font-weight: 400;
  letter-spacing: 0.04em;
  color: var(--ink);
  margin-bottom: 8px;
}
.header .tagline {
  font-size: 13px;
  color: var(--ink-dim);
  letter-spacing: 0.08em;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
  width: min(860px, 100%);
}

.card {
  position: relative;
  background: var(--paper-lift);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 36px 32px;
  text-decoration: none;
  color: inherit;
  transition: all 0.32s cubic-bezier(0.22, 1, 0.36, 1);
  overflow: hidden;
  cursor: pointer;
  display: block;
}
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: radial-gradient(circle at 30% 20%, rgba(201,169,110,0.06), transparent 70%);
  opacity: 0;
  transition: opacity 0.4s ease;
}
.card:hover {
  transform: translateY(-4px);
  border-color: rgba(201,169,110,0.25);
  box-shadow: 0 24px 60px rgba(0,0,0,0.4);
}
.card:hover::before {
  opacity: 1;
}
.card:active {
  transform: scale(0.98);
}

.card-icon {
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  font-size: 1.5rem;
  margin-bottom: 20px;
  background: rgba(201,169,110,0.1);
  border: 1px solid rgba(201,169,110,0.15);
  transition: all 0.3s ease;
}
.card:hover .card-icon {
  background: rgba(201,169,110,0.18);
  border-color: rgba(201,169,110,0.35);
  transform: scale(1.05);
}

.card h2 {
  font-size: 1.25rem;
  font-weight: 400;
  letter-spacing: 0.03em;
  margin-bottom: 8px;
  color: var(--ink);
}
.card p {
  font-size: 0.9rem;
  color: var(--ink-dim);
  line-height: 1.7;
  letter-spacing: 0.02em;
}
.card .badge {
  display: inline-block;
  margin-top: 16px;
  padding: 4px 12px;
  border-radius: 999px;
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  border: 1px solid var(--line);
  color: var(--gold);
  transition: all 0.3s ease;
}
.card:hover .badge {
  border-color: rgba(201,169,110,0.3);
  background: rgba(201,169,110,0.08);
}

@media (max-width: 620px) {
  body {
    justify-content: flex-start;
    padding-top: 60px;
  }
  .header {
    margin-bottom: 36px;
  }
  .cards {
    grid-template-columns: 1fr;
    width: 100%;
  }
  .card {
    padding: 28px 24px;
  }
}

@supports (padding: env(safe-area-inset-top)) {
  body {
    padding-top: calc(60px + env(safe-area-inset-top));
    padding-bottom: calc(32px + env(safe-area-inset-bottom));
  }
}

@media (prefers-reduced-motion: reduce) {
  .card, .card-icon, .card .badge {
    transition: none !important;
  }
}
</style>
</head>
<body>

<div class="header">
  <h1>Aertherion</h1>
  <p class="tagline">Projects &amp; Portfolio</p>
</div>

<div class="cards">
  <a class="card" href="./strive/">
    <div class="card-icon">⏳</div>
    <h2>考研督学</h2>
    <p>天大×港理工 · AI 驱动的考研学习管理系统，含每日建议、打卡、统计与 DeepSeek 答疑。</p>
    <span class="badge">Strive</span>
  </a>

  <a class="card" href="./portfolio/">
    <div class="card-icon">📂</div>
    <h2>个人作品集</h2>
    <p>大数据管理与应用 · AI、数据与设计方向的项目履历、技能统计与作品展示。</p>
    <span class="badge">Portfolio</span>
  </a>
</div>

</body>
</html>
